<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScaffoldIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:100%;-webkit-font-smoothing:antialiased}

body{
  font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#fff;
  color:#111;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── Header ── */
.header{
  padding:16px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #f0f0f0;
  position:sticky;top:0;z-index:50;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.header-left{display:flex;align-items:center;gap:12px}
.logo{
  width:32px;height:32px;
  background:#1a1a1a;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:700;font-size:14px;
}
.brand{font-weight:700;font-size:17px;letter-spacing:-0.02em}
.header-right{display:flex;align-items:center;gap:16px}
.status{font-size:12px;color:#999;display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:#1a1a1a;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:13px;cursor:pointer;
}

/* ── Main ── */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 24px 140px;
  max-width:640px;
  margin:0 auto;
  width:100%;
}

/* ── Greeting ── */
.greeting{
  text-align:center;
  margin-bottom:48px;
  animation:fadeIn .6s ease both;
}
.greeting h1{
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.03em;
  line-height:1.2;
  margin-bottom:8px;
}
.greeting p{
  font-size:15px;
  color:#666;
  line-height:1.5;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Snapshot Cards ── */
.snapshot{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  width:100%;
  margin-bottom:48px;
  animation:fadeIn .6s ease .1s both;
}
.snap-card{
  background:#fafafa;
  border-radius:12px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:all .15s ease;
  border:1px solid transparent;
}
.snap-card:hover{background:#f5f5f5;border-color:#e5e5e5}
.snap-card .num{
  font-size:32px;
  font-weight:700;
  letter-spacing:-0.03em;
  line-height:1;
  margin-bottom:6px;
  font-variant-numeric:tabular-nums;
}
.snap-card .label{font-size:13px;color:#666;line-height:1.3}
.snap-card.alert .num{color:#dc2626}
.snap-card.warn .num{color:#d97706}

/* ── Chat Container ── */
.chat-area{
  width:100%;
  animation:fadeIn .6s ease .2s both;
}

/* ── Input ── */
.input-wrap{
  background:#fafafa;
  border:1px solid #e8e8e8;
  border-radius:16px;
  display:flex;
  align-items:center;
  padding:6px 8px 6px 20px;
  transition:all .2s ease;
  margin-bottom:16px;
}
.input-wrap:focus-within{
  background:#fff;
  border-color:#111;
  box-shadow:0 0 0 3px rgba(0,0,0,0.04);
}
.input-wrap input{
  flex:1;border:none;outline:none;
  font-family:inherit;font-size:15px;
  background:transparent;color:#111;
  padding:10px 0;
}
.input-wrap input::placeholder{color:#aaa}
.send-btn{
  width:40px;height:40px;
  border:none;background:#111;color:#fff;
  border-radius:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;flex-shrink:0;
}
.send-btn:hover{background:#333;transform:scale(1.04)}
.send-btn svg{width:18px;height:18px}

/* ── Quick Prompts ── */
.prompts{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}
.prompt-chip{
  font-size:13px;
  color:#555;
  background:#fff;
  border:1px solid #e8e8e8;
  border-radius:100px;
  padding:8px 16px;
  cursor:pointer;
  transition:all .15s ease;
  white-space:nowrap;
}
.prompt-chip:hover{
  border-color:#111;
  color:#111;
  background:#fafafa;
}

/* ── Chat Messages ── */
.messages{
  width:100%;
  margin-bottom:24px;
  display:none;
}
.messages.visible{display:block}

.msg{
  margin-bottom:20px;
  animation:fadeIn .3s ease both;
}
.msg-user{
  display:flex;justify-content:flex-end;
}
.msg-user .bubble{
  background:#111;color:#fff;
  border-radius:16px 16px 4px 16px;
  padding:12px 18px;
  font-size:14px;line-height:1.5;
  max-width:80%;
}
.msg-ai{
  display:flex;flex-direction:column;gap:12px;
}
.msg-ai .bubble{
  background:#fafafa;
  border-radius:4px 16px 16px 16px;
  padding:16px 20px;
  font-size:14px;line-height:1.6;
  color:#333;
  max-width:100%;
}

/* ── AI Data Cards (in response) ── */
.data-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:8px;
}
.data-item{
  background:#fff;
  border:1px solid #eee;
  border-radius:10px;
  padding:14px 16px;
}
.data-item .d-num{
  font-size:24px;font-weight:700;
  letter-spacing:-0.02em;line-height:1;
  margin-bottom:4px;
  font-variant-numeric:tabular-nums;
}
.data-item .d-label{font-size:12px;color:#888}

.followups{display:flex;flex-wrap:wrap;gap:6px}
.followup{
  font-size:12px;color:#2563eb;
  background:#eff6ff;
  border:1px solid #dbeafe;
  border-radius:100px;
  padding:6px 12px;
  cursor:pointer;transition:all .15s ease;
}
.followup:hover{background:#2563eb;color:#fff;border-color:#2563eb}

/* ── Typing Indicator ── */
.typing{
  display:flex;gap:4px;
  padding:16px 20px;
  background:#fafafa;
  border-radius:4px 16px 16px 16px;
  width:fit-content;
}
.typing span{
  width:6px;height:6px;border-radius:50%;
  background:#bbb;
  animation:bounce .6s ease infinite;
}
.typing span:nth-child(2){animation-delay:.1s}
.typing span:nth-child(3){animation-delay:.2s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── Responsive ── */
@media(max-width:600px){
  .header{padding:12px 16px}
  .main{padding:24px 16px 140px}
  .greeting h1{font-size:22px}
  .snapshot{grid-template-columns:repeat(3,1fr);gap:8px}
  .snap-card{padding:14px 10px}
  .snap-card .num{font-size:24px}
  .snap-card .label{font-size:11px}
  .prompts{justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .data-row{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">S</div>
    <span class="brand">ScaffoldIQ</span>
  </div>
  <div class="header-right">
    <span class="status"><span class="status-dot"></span>Connected</span>
    <div class="avatar" title="Zaib Wemyss">Z</div>
  </div>
</header>

<main class="main">

  <div class="greeting" id="greeting">
    <h1 id="greetingText">Good afternoon, Zaib</h1>
    <p>Your scaffold operations at Big Gore Refinery</p>
  </div>

  <div class="snapshot" id="snapshot">
    <div class="snap-card" onclick="askAbout('standing scaffolds')">
      <div class="num">1,645</div>
      <div class="label">Standing</div>
    </div>
    <div class="snap-card warn" onclick="askAbout('open requests')">
      <div class="num">3,024</div>
      <div class="label">Open requests</div>
    </div>
    <div class="snap-card alert" onclick="askAbout('failed inspections')">
      <div class="num">703</div>
      <div class="label">Awaiting inspection</div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="input-wrap">
      <input type="text" id="input" placeholder="Ask about your scaffolds..." autocomplete="off" />
      <button class="send-btn" onclick="send()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <div class="prompts" id="prompts">
      <span class="prompt-chip" onclick="askAbout('How many scaffolds are in AMRU?')">Scaffolds in AMRU</span>
      <span class="prompt-chip" onclick="askAbout('Show failed inspections this week')">Failed inspections</span>
      <span class="prompt-chip" onclick="askAbout('Which requests are stuck in approval?')">Stuck approvals</span>
      <span class="prompt-chip" onclick="askAbout('Give me a safety compliance summary')">Safety compliance</span>
      <span class="prompt-chip" onclick="askAbout('Who are the most active team members?')">Team activity</span>
    </div>
  </div>

</main>

<script>
const responses = {
  'standing scaffolds': {
    text: '1,645 scaffolds are currently standing across 10 areas. The highest concentration is in AMRU with 350, followed by ALKY with 288.',
    cards: [
      {num:'350',label:'AMRU'},
      {num:'288',label:'ALKY'},
      {num:'277',label:'LFSP'},
      {num:'207',label:'STFA'},
    ],
    followups: ['Show all areas', 'Which are past dismantle date?', 'Tag status breakdown']
  },
  'open requests': {
    text: '3,024 requests are currently in the pipeline. The majority are in the approval stages — 1,059 awaiting initial approval and 1,031 in final approval.',
    cards: [
      {num:'1,059',label:'Initial approval'},
      {num:'1,031',label:'Final approval'},
      {num:'613',label:'Secondary'},
      {num:'16',label:'Ready to build'},
    ],
    followups: ['Requests stuck over 7 days', 'Who needs to approve?', 'This week\'s throughput']
  },
  'failed inspections': {
    text: '703 scaffolds are awaiting inspection. There have been 561 failed inspections total, with 23 this week — mostly GPS distance warnings in ALKY and AMRU areas.',
    cards: [
      {num:'703',label:'Awaiting inspection'},
      {num:'561',label:'Total failed'},
      {num:'23',label:'Failed this week'},
      {num:'87%',label:'Pass rate (30d)'},
    ],
    followups: ['Show failure reasons', 'ALKY area details', 'List inspectors']
  },
  'How many scaffolds are in AMRU?': {
    text: 'AMRU has 350 standing scaffolds — the most of any area on site. 312 are past their planned dismantle date.',
    cards: [
      {num:'350',label:'Standing'},
      {num:'312',label:'Past dismantle'},
      {num:'38',label:'On schedule'},
    ],
    followups: ['Show sub-areas', 'Inspection status', 'Recent activity in AMRU']
  },
  'Show failed inspections this week': {
    text: '23 inspections failed this week, up 12% from last week. The top failure reason is GPS distance warnings — inspectors scanning from too far away.',
    cards: [
      {num:'23',label:'Failed this week'},
      {num:'12',label:'GPS warnings'},
      {num:'6',label:'In ALKY area'},
      {num:'5',label:'In AMRU area'},
    ],
    followups: ['Show all failure reasons', 'Contact area inspectors', 'Adjust distance threshold']
  },
  'Which requests are stuck in approval?': {
    text: '47 requests have been waiting more than 7 days for approval. The oldest is R-0002847 in STFA, pending for 14 days. 4 approvers haven\'t logged in this week.',
    cards: [
      {num:'47',label:'Stuck over 7 days'},
      {num:'14d',label:'Oldest pending'},
      {num:'3.2d',label:'Avg approval time'},
      {num:'4',label:'Inactive approvers'},
    ],
    followups: ['Show the 47 stuck requests', 'Who are the inactive approvers?', 'Reassignment options']
  },
  'Give me a safety compliance summary': {
    text: 'Overall pass rate is 87.3% over the last 30 days. 703 scaffolds are awaiting inspection — 42.7% of standing stock. 4 handovers were rejected. Nearly all standing scaffolds are past dismantle date.',
    cards: [
      {num:'87.3%',label:'Pass rate (30d)'},
      {num:'703',label:'Awaiting inspection'},
      {num:'4',label:'Failed handovers'},
      {num:'98.6%',label:'Past dismantle date'},
    ],
    followups: ['Inspection schedule', 'Failed handover details', 'Export compliance report']
  },
  'Who are the most active team members?': {
    text: '31 of 54 registered personnel have been active this week. The busiest are Abigail MacDonald, Brandon Kelly, and Cameron Wilson.',
    cards: [
      {num:'47',label:'Abigail MacDonald'},
      {num:'38',label:'Brandon Kelly'},
      {num:'31',label:'Cameron Wilson'},
      {num:'23',label:'Inactive this week'},
    ],
    followups: ['Show full team list', 'Workload distribution', 'Contractor breakdown']
  },
};

// Default fallback
const fallback = {
  text: 'I can help you with scaffold status, inspections, requests, safety compliance, and team workload. Try one of the suggested questions below.',
  cards: [],
  followups: ['Standing scaffolds', 'Failed inspections', 'Open requests', 'Safety compliance']
};

function getResponse(query) {
  const q = query.toLowerCase();
  for (const [key, val] of Object.entries(responses)) {
    if (q.includes(key.toLowerCase().substring(0, 10)) || key.toLowerCase().includes(q.substring(0, 10))) {
      return val;
    }
  }
  // Try partial match
  if (q.includes('scaffold')) return responses['standing scaffolds'];
  if (q.includes('inspect') || q.includes('fail')) return responses['failed inspections'];
  if (q.includes('request') || q.includes('approv')) return responses['open requests'];
  if (q.includes('safe') || q.includes('compli')) return responses['Give me a safety compliance summary'];
  if (q.includes('team') || q.includes('people') || q.includes('active')) return responses['Who are the most active team members?'];
  if (q.includes('amru')) return responses['How many scaffolds are in AMRU?'];
  if (q.includes('stuck')) return responses['Which requests are stuck in approval?'];
  return fallback;
}

function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  askAbout(text);
}

function askAbout(query) {
  const msgs = document.getElementById('messages');
  const prompts = document.getElementById('prompts');
  const snapshot = document.getElementById('snapshot');

  msgs.classList.add('visible');

  // After first message, shrink snapshot and hide prompts
  snapshot.style.display = 'none';
  prompts.style.display = 'none';

  // Shrink greeting
  const greeting = document.getElementById('greeting');
  greeting.style.marginBottom = '24px';
  greeting.querySelector('h1').style.fontSize = '20px';
  greeting.querySelector('p').style.fontSize = '13px';

  // Add user message
  const userMsg = document.createElement('div');
  userMsg.className = 'msg msg-user';
  userMsg.innerHTML = `<div class="bubble">${escHtml(query)}</div>`;
  msgs.appendChild(userMsg);

  // Add typing indicator
  const typingMsg = document.createElement('div');
  typingMsg.className = 'msg msg-ai';
  typingMsg.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(typingMsg);

  scrollToBottom();

  // Simulate AI delay
  setTimeout(() => {
    typingMsg.remove();

    const data = getResponse(query);
    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg msg-ai';

    let cardsHtml = '';
    if (data.cards.length) {
      cardsHtml = `<div class="data-row">${data.cards.map(c =>
        `<div class="data-item"><div class="d-num">${c.num}</div><div class="d-label">${c.label}</div></div>`
      ).join('')}</div>`;
    }

    let followHtml = '';
    if (data.followups.length) {
      followHtml = `<div class="followups">${data.followups.map(f =>
        `<span class="followup" onclick="askAbout('${escAttr(f)}')">${escHtml(f)}</span>`
      ).join('')}</div>`;
    }

    aiMsg.innerHTML = `
      <div class="bubble">${escHtml(data.text)}</div>
      ${cardsHtml}
      ${followHtml}
    `;
    msgs.appendChild(aiMsg);
    scrollToBottom();

    // Show prompts again after response
    prompts.style.display = 'flex';
  }, 800 + Math.random() * 400);
}

function scrollToBottom() {
  window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// Enter to send
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); send(); }
});

// Dynamic greeting
(function() {
  const h = new Date().getHours();
  let g = 'Good morning';
  if (h >= 12 && h < 17) g = 'Good afternoon';
  if (h >= 17) g = 'Good evening';
  document.getElementById('greetingText').textContent = g + ', Zaib';
})();
</script>

</body>
</html>
